services:
  db:
    image: postgres:16-alpine
    container_name: gf_database
    restart: always
    environment:
      POSTGRES_DB: GerenciadorFinanceiro
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password123
    ports:
      - "5433:5432"
    volumes:
      - gf_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d GerenciadorFinanceiro"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: GerenciadorFinanceiro.Api/Dockerfile
    container_name: gf_api
    restart: always
    environment:
      - ConnectionStrings__DefaultConnection=Host=db;Database=GerenciadorFinanceiro;Username=postgres;Password=password123
      - ASPNETCORE_ENVIRONMENT=Production
    ports:
      - "5000:8080"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  web:
    build:
      context: .
      dockerfile: GerenciadorFinanceiro.Web/Dockerfile
    container_name: gf_web
    restart: always
    ports:
      - "80:80"
    depends_on:
      api:
        condition: service_healthy

volumes:
  gf_db_data:

services:
  db:
    image: postgres:16-alpine
    container_name: gf_database
    restart: always
    environment:
      POSTGRES_DB: gerenciador_financeiro
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password123
    ports:
      - "5432:5432"
    volumes:
      - ./infra/data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d gerenciador_financeiro"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: GerenciadorFinanceiro.Api/Dockerfile
    container_name: gf_api
    restart: always
    environment:
      - ConnectionStrings__DefaultConnection=Host=db;Database=gerenciador_financeiro;Username=admin;Password=password123
      - ASPNETCORE_ENVIRONMENT=Production
    ports:
      - "5000:8080"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  web:
    build:
      context: .
      dockerfile: GerenciadorFinanceiro.Web/Dockerfile
    container_name: gf_web
    restart: always
    ports:
      - "80:80"
    depends_on:
      api:
        condition: service_healthy

name: .NET CI

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 9.0.x

    - name: Restore dependencies
      run: dotnet restore GerenciadorFinanceiro.sln

    - name: Build (Lint Check)
      run: dotnet build GerenciadorFinanceiro.sln --no-restore --configuration Release

    - name: Check Formatting
      run: dotnet format GerenciadorFinanceiro.sln --verify-no-changes --no-restore

    - name: Test
      run: dotnet test GerenciadorFinanceiro.sln --no-build --configuration Release --verbosity normal
